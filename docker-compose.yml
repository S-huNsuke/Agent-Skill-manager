# 此 docker-compose.yml 仅用于开发环境和 CI 测试，不用于生产部署。
# 生产环境请使用官方发布渠道获取预编译二进制文件。
services:
  agent-skills-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-skills-manager
    ports:
      - "8080:8080"
    volumes:
      - asm-data:/app/data
      - asm-cache:/root/Library/Application\ Support/agent-skills-manager
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  asm-data:
  asm-cache:
